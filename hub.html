<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Caryn &amp; Lars · Planning Command Center</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Josefin+Sans:wght@300;400;500;600&family=Great+Vibes&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f4efe6; --panel:#fffdf8; --panel2:#faf5ec;
    --ink:#4a4034; --muted:#8d8170; --bronze:#a9885f; --bronze-d:#8a6f4a;
    --sand:#e8dcc8; --line:#e4d9c6; --sage:#9aa882; --sage-d:#788a5b; --gold:#c9a25a;
    --terra:#bf7849; --terra-d:#a5612f; --eucalyptus:#aeba96;
    --ok:#7e9a5e; --warn:#c79a4e; --pend:#b08a8a;
    --shadow:0 8px 30px rgba(74,64,52,.10);
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:linear-gradient(160deg,#f6f1e7 0%,#efe7d6 45%,#eaeadd 100%);background-attachment:fixed;color:var(--ink);font-family:'Josefin Sans',system-ui,sans-serif;font-weight:300;line-height:1.55}
  h1,h2,h3,h4{font-family:'Cormorant Garamond',serif;font-weight:500;margin:0 0 .35em;letter-spacing:.01em}
  h1{font-size:1.9rem}h2{font-size:1.5rem}h3{font-size:1.2rem}
  .script{font-family:'Great Vibes',cursive;font-weight:400}
  a{color:var(--bronze-d)}
  .layout{display:flex;min-height:100vh}
  /* sidebar */
  .side{width:248px;flex:0 0 248px;background:linear-gradient(180deg,#fffdf8,#f7f1e6);border-right:1px solid var(--line);position:sticky;top:0;height:100vh;overflow-y:auto;padding:22px 0}
  .brand{padding:0 22px 14px;border-bottom:1px solid var(--line);margin-bottom:10px}
  .brand .names{font-family:'Great Vibes',cursive;font-size:2rem;color:var(--bronze-d);line-height:1}
  .brand .sub{font-size:.7rem;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);margin-top:6px}
  .countdown{margin:10px 22px 14px;background:linear-gradient(150deg,var(--bronze),var(--terra));border:0;border-radius:12px;padding:13px;text-align:center;box-shadow:0 6px 16px rgba(165,97,47,.22)}
  .countdown .big{font-family:'Cormorant Garamond',serif;font-size:2.3rem;color:#fff;line-height:1}
  .countdown .lbl{font-size:.66rem;letter-spacing:.18em;text-transform:uppercase;color:#fdf3e6}
  .countdown .lbl[style]{color:#fff!important}
  nav{display:flex;flex-direction:column;padding:4px 12px}
  nav button{display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:none;border:0;cursor:pointer;
    font-family:'Josefin Sans',sans-serif;font-size:.92rem;color:var(--ink);padding:9px 12px;border-radius:9px;transition:.15s}
  nav button:hover{background:var(--sand)}
  nav button.active{background:linear-gradient(95deg,var(--bronze-d),var(--terra));color:#fff;font-weight:400;box-shadow:0 4px 12px rgba(165,97,47,.22)}
  nav button .ico{width:18px;text-align:center;color:var(--terra);opacity:.9}
  nav button.active .ico{color:#fff}
  .navnote{padding:14px 22px;font-size:.68rem;color:var(--muted);line-height:1.5;border-top:1px solid var(--line);margin-top:8px}
  /* main */
  main{flex:1;padding:34px 40px 80px;max-width:1100px}
  .tab{display:none;animation:fade .25s ease}
  .tab.active{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .pagehead{margin-bottom:20px}
  .pagehead .eyebrow{font-size:.72rem;letter-spacing:.22em;text-transform:uppercase;color:var(--terra-d);font-weight:500}
  .pagehead h1{margin:.1em 0 .15em}
  .pagehead p{margin:0;color:var(--muted);max-width:70ch}
  /* cards */
  .grid{display:grid;gap:16px}
  .g2{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:repeat(3,1fr)}.g4{grid-template-columns:repeat(4,1fr)}
  .card{position:relative;background:linear-gradient(180deg,#fffdf8,#fcf6ec);border:1px solid var(--line);border-radius:14px;padding:18px 20px;box-shadow:var(--shadow)}
  .card::before{content:"";position:absolute;left:0;right:0;top:0;height:3px;border-radius:14px 14px 0 0;background:linear-gradient(90deg,var(--bronze),var(--terra),var(--gold),var(--sage))}
  .card h3{color:var(--bronze-d);display:flex;align-items:center;gap:8px}
  .card.tight{padding:14px 16px}
  .stat{font-family:'Cormorant Garamond',serif;font-size:1.9rem;color:var(--bronze-d);line-height:1}
  .stat-lbl{font-size:.72rem;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
  .kv{display:grid;grid-template-columns:auto 1fr;gap:6px 16px;font-size:.92rem}
  .kv dt{color:var(--muted)}
  .kv dd{margin:0;text-align:right}
  ul.clean{list-style:none;padding:0;margin:0}
  ul.clean li{padding:7px 0;border-bottom:1px dashed var(--line);display:flex;justify-content:space-between;gap:12px}
  ul.clean li:last-child{border-bottom:0}
  ul.dot{margin:.2em 0 .2em 1.1em;padding:0}
  ul.dot li{margin:.3em 0}
  .pill{display:inline-block;font-size:.66rem;letter-spacing:.08em;text-transform:uppercase;padding:3px 9px;border-radius:999px;font-weight:500}
  .pill.ok{background:#e8efdd;color:#5d7740}
  .pill.warn{background:#f6ecd6;color:#9a7526}
  .pill.pend{background:#f1e4e4;color:#9a6a6a}
  .pill.todo{background:#eee7da;color:#897a60}
  table{width:100%;border-collapse:collapse;font-size:.9rem}
  th,td{text-align:left;padding:9px 10px;border-bottom:1px solid var(--line)}
  th{font-family:'Josefin Sans';font-weight:500;color:var(--muted);font-size:.74rem;letter-spacing:.1em;text-transform:uppercase}
  td.num,th.num{text-align:right;white-space:nowrap}
  tr.total td{border-top:2px solid var(--bronze);font-weight:500;font-size:1rem}
  .muted{color:var(--muted)}
  .sec{margin-top:26px}
  .sec h2{border-bottom:2px solid var(--sand);border-left:4px solid var(--terra);padding:2px 0 6px 10px;color:var(--ink)}
  /* colour variety on stat tiles */
  .grid.g4 .card:nth-child(1) .stat{color:var(--bronze-d)}
  .grid.g4 .card:nth-child(2) .stat{color:var(--sage-d)}
  .grid.g4 .card:nth-child(3) .stat{color:var(--terra)}
  .grid.g4 .card:nth-child(4) .stat{color:var(--gold)}
  .grid.g3 .card:nth-child(1) .stat{color:var(--bronze-d)}
  .grid.g3 .card:nth-child(2) .stat{color:var(--terra)}
  .grid.g3 .card:nth-child(3) .stat{color:var(--sage-d)}
  /* timeline */
  .tl{position:relative;margin:10px 0 0 8px;padding-left:24px;border-left:2px solid var(--sand)}
  .tl .ev{position:relative;padding:0 0 18px 4px}
  .tl .ev::before{content:"";position:absolute;left:-31px;top:3px;width:12px;height:12px;border-radius:50%;background:var(--bronze);border:3px solid var(--panel)}
  .tl .ev .t{font-family:'Cormorant Garamond',serif;font-size:1.05rem;color:var(--bronze-d)}
  .tl .ev .d{font-size:.74rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
  /* checklist */
  .prog{height:10px;background:var(--sand);border-radius:999px;overflow:hidden;margin:6px 0 2px}
  .prog > i{display:block;height:100%;background:linear-gradient(90deg,var(--sage),var(--bronze));width:0;transition:width .4s}
  .check{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px dashed var(--line)}
  .check:last-child{border-bottom:0}
  .check input{margin-top:4px;width:17px;height:17px;accent-color:var(--bronze);cursor:pointer;flex:0 0 auto}
  .check label{cursor:pointer;flex:1}
  .check.done label{text-decoration:line-through;color:var(--muted)}
  .check .del{background:none;border:0;color:var(--muted);cursor:pointer;font-size:.9rem;opacity:.5}
  .check .del:hover{opacity:1;color:var(--pend)}
  .addrow{display:flex;gap:8px;margin-top:10px}
  .addrow input{flex:1;padding:8px 10px;border:1px solid var(--line);border-radius:8px;font-family:inherit;font-size:.9rem;background:var(--panel)}
  .btn{background:var(--bronze);color:#fff;border:0;border-radius:8px;padding:8px 14px;cursor:pointer;font-family:inherit;font-size:.85rem}
  .btn:hover{background:var(--bronze-d)}
  .btn.ghost{background:none;color:var(--bronze-d);border:1px solid var(--line)}
  iframe{width:100%;height:560px;border:1px solid var(--line);border-radius:12px;background:#fff}
  .note{background:var(--panel2);border-left:3px solid var(--bronze);padding:10px 14px;border-radius:0 8px 8px 0;font-size:.88rem;color:var(--muted);margin:8px 0}
  .tag{font-size:.7rem;color:var(--muted)}
  .linkbtns{display:flex;flex-wrap:wrap;gap:10px;margin-top:10px}
  /* clickable list rows */
  .lk{cursor:pointer;transition:.12s}
  ul.clean li.lk:hover{background:#fbf3ea;border-radius:8px;padding-left:8px;padding-right:8px}
  ul.clean li.lk .go{color:var(--terra);opacity:0;transition:.12s}
  ul.clean li.lk:hover .go{opacity:1}
  /* photo galleries */
  .gallery{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:12px}
  .gallery.cols4{grid-template-columns:repeat(4,1fr)}
  @media(max-width:700px){.gallery.cols4{grid-template-columns:repeat(2,1fr)}}
  .gallery a{display:block;overflow:hidden;border-radius:10px;border:1px solid var(--line);box-shadow:var(--shadow)}
  .gallery img{width:100%;height:135px;object-fit:cover;display:block;transition:.25s}
  .gallery a:hover img{transform:scale(1.06)}
  .drop{border:2px dashed var(--terra);background:#fbf2e9;border-radius:12px;padding:18px 16px;text-align:center;color:var(--terra-d);font-size:.9rem;margin-top:12px}
  .drop b{color:var(--bronze-d)}
  .gwrap{display:grid;grid-template-columns:repeat(auto-fit,minmax(215px,1fr));gap:14px;margin-top:12px}
  ul.clean.sm li{font-size:.85rem;padding:5px 0}
  /* extra colour touches */
  ul.dot li::marker{color:var(--terra)}
  .kv dt{color:var(--sage-d)}
  tr.total td{color:var(--terra-d)}
  .mapframe{height:300px}
  .topbar{display:none}
  @media(max-width:860px){
    .layout{flex-direction:column}
    .side{position:static;width:auto;height:auto;flex:none;display:none}
    .side.open{display:block}
    .topbar{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;background:var(--panel);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:10}
    .topbar .names{font-family:'Great Vibes',cursive;font-size:1.5rem;color:var(--bronze-d)}
    main{padding:20px}
    .g2,.g3,.g4{grid-template-columns:1fr}
  }
  @media print{.side,.topbar,.addrow,.linkbtns{display:none}main{max-width:none}.tab{display:block!important}}
</style>
</head>

<script>
/* ============================ RENDER ============================ */
const $ = (s,el=document)=>el.querySelector(s);
const esc = s => String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

/* ---- countdown ---- */
function tickCountdown(){
  const d = new Date(WEDDING_DATE) - new Date();
  const days = Math.max(0, Math.ceil(d/86400000));
  $("#cdDays").textContent = days;
}

/* ---- checklist persistence ---- */
const LS_KEY = "wpc_v1";
function loadState(){ try{return JSON.parse(localStorage.getItem(LS_KEY))||{}}catch(e){return {}} }
function saveState(s){ localStorage.setItem(LS_KEY, JSON.stringify(s)); }
let STATE = loadState();
STATE.checked = STATE.checked || {};
STATE.custom = STATE.custom || {};   // section -> [text,...]

function allTasks(){
  const out=[];
  for(const sec in CHECKLIST) CHECKLIST[sec].forEach(([t])=>out.push(sec+"::"+t));
  for(const sec in STATE.custom) (STATE.custom[sec]||[]).forEach(t=>out.push(sec+"::"+t));
  return out;
}
function defaultsChecked(){
  // seed done-by-default once
  if(STATE._seeded) return;
  for(const sec in CHECKLIST) CHECKLIST[sec].forEach(([t,done])=>{ if(done) STATE.checked[sec+"::"+t]=true; });
  STATE._seeded = true; saveState(STATE);
}
function progressPct(){
  const keys = allTasks();
  if(!keys.length) return 0;
  const done = keys.filter(k=>STATE.checked[k]).length;
  return Math.round(done/keys.length*100);
}

/* ---- tab builders ---- */
function pagehead(eyebrow,title,desc){
  return `<div class="pagehead"><div class="eyebrow">${eyebrow}</div><h1>${title}</h1><p>${desc}</p></div>`;
}

function tab_dashboard(){
  const pct = progressPct();
  return pagehead("Overview","Welcome back","Everything for 24 July 2027 at Marriott Praia D'El Rey — design, vendors, guests, logistics and the day-of plan, all in one place.")

          <li class="lk" onclick="render('bridal')">Bridal gown — Academia das Noivas <span><span class="pill ok">Confirmed</span> <span class="go">›</span></span></li>
          <li>Hair & Makeup <span class="pill todo">To book</span></li>
          <li>Cake <span class="pill todo">To book</span></li>

function tab_checklist(){
  let html = pagehead("Tracker","Checklist & Tasks","Tick things off as you go — progress is saved in this browser. Add your own tasks to any section.")
   + `<div class="card"><h3>Overall progress</h3><div class="prog"><i id="progBar"></i></div><div class="stat-lbl" id="progLbl"></div></div>`;
  const sections = new Set([...Object.keys(CHECKLIST), ...Object.keys(STATE.custom)]);
  for(const sec of sections){
    const base = (CHECKLIST[sec]||[]).map(([t])=>t);
    const custom = STATE.custom[sec]||[];
    html += `<div class="card sec"><h3>${esc(sec)}</h3><div data-sec="${esc(sec)}">`;
    base.forEach(t=>html += checkRow(sec,t,false));
    custom.forEach(t=>html += checkRow(sec,t,true));
    html += `</div><div class="addrow"><input placeholder="Add a task…" data-add="${esc(sec)}"><button class="btn" onclick="addTask('${esc(sec).replace(/'/g,"\\'")}')">Add</button></div></div>`;
  }
  return html;
}
function checkRow(sec,t,isCustom){
  const id = sec+"::"+t;
  const done = STATE.checked[id] ? "done":"";
  return `<div class="check ${done}">
    <input type="checkbox" ${STATE.checked[id]?"checked":""} onchange="toggle(this,'${esc(id).replace(/'/g,"\\'")}')">
    <label>${esc(t)}</label>
    ${isCustom?`<button class="del" title="Remove" onclick="delTask('${esc(sec).replace(/'/g,"\\'")}','${esc(t).replace(/'/g,"\\'")}')">✕</button>`:""}
  </div>`;
}
function toggle(el,id){ STATE.checked[id]=el.checked; saveState(STATE); el.closest(".check").classList.toggle("done",el.checked); refreshProgress(); }
function addTask(sec){
  const inp = document.querySelector(`[data-add="${CSS.escape(sec)}"]`);
  const v = (inp.value||"").trim(); if(!v) return;
  STATE.custom[sec]=STATE.custom[sec]||[]; STATE.custom[sec].push(v); saveState(STATE); render("checklist");
}
function delTask(sec,t){
  STATE.custom[sec]=(STATE.custom[sec]||[]).filter(x=>x!==t);
  delete STATE.checked[sec+"::"+t]; saveState(STATE); render("checklist");
}
function refreshProgress(){
  const pct=progressPct(); const b=$("#progBar"), l=$("#progLbl");
  if(b){b.style.width=pct+"%";} if(l){l.textContent=pct+"% complete";}
  const dd=$("#dashDaysPct"); // noop
}

function render(tab){
  document.querySelectorAll("#nav button").forEach(b=>b.classList.toggle("active",b.dataset.tab===tab));
  $("#main").innerHTML = BUILDERS[tab]();
  if(tab==="dashboard"){ $("#dashDays").textContent = $("#cdDays").textContent; }
  if(tab==="checklist"){ refreshProgress(); }
  location.hash = tab;
  if(window.innerWidth<=860) document.querySelector(".side").classList.remove("open");
  window.scrollTo(0,0);
}

/* build nav */
$("#nav").innerHTML = TABS.map(([id,label,ico])=>
  `<button data-tab="${id}" onclick="render('${id}')"><span class="ico">${ico}</span>${label}</button>`).join("");

defaultsChecked();
tickCountdown(); setInterval(tickCountdown, 3600000);
render((location.hash||"#dashboard").slice(1));
